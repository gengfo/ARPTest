# Common properties
jawr.debug.on=true
jawr.gzip.on=true
jawr.gzip.ie6.on=false
jawr.charset.name=UTF-8

# Javascript properties and mappings
jawr.js.bundle.basedir=/js

# All files within /js/lib will be together in a bundle. 
# The remaining scripts will be served sepparately.
jawr.js.bundle.extJsCompressed.id=/jsBundle/extJsCompressed.js
jawr.js.bundle.extJsCompressed.mappings=/js/ext/adapter/ext-base.js, /js/ext/ext-all.js , /js/ext/ux/ux-all.js
jawr.js.bundle.extJsCompressed.debugnever=true

jawr.js.bundle.extJsDebug.id=/jsBundle/extJsDebug.js
jawr.js.bundle.extJsDebug.mappings=/js/ext/adapter/ext-base-debug.js, /js/ext/ext-all-debug.js , /js/ext/ux/ux-all-debug.js
jawr.js.bundle.extJsDebug.debugonly=true

jawr.js.bundle.clientfwk.id=/jsBundle/clientfwk.js
jawr.js.bundle.clientfwk.mappings=/js/frm/coverage/**, /js/frm/common/frmwk-config.js ,/js/frm/common/logger-frmwk.js, /js/frm/exception/exception-frmwk.js, /js/frm/art/art-frmwk.js, /js/frm/common/common-frmwk.js, /js/frm/wam/openAjax.js, /js/frm/wam/wam-frmwk.js, /js/frm/clientpush/**
#jawr.js.bundle.clientfwk.debugnever=true
#

#jawr.js.bundle.clientfwkDebug.id=/jsBundle/clientfwkDebug.js
#jawr.js.bundle.clientfwkDebug.mappings=/js/frm/common/frmwk-config.js ,/js/frm/common/logger-frmwk-debug.js, /js/frm/exception/exception-frmwk-debug.js, /js/frm/art/art-frmwk-debug.js, /js/frm/common/common-frmwk-debug.js
#jawr.js.bundle.clientfwkDebug.debugonly=true

jawr.js.bundle.common.id=/jsBundle/common.js
jawr.js.bundle.common.mappings=/js/com.oocl.ir4.arp.web/common/** ,/js/com.oocl.ir4.arp.web/commonUI/**
jawr.js.bundle.common.dependencies=extJsCompressed, extJsDebug, clientfwk

jawr.js.bundle.invoice.id=/jsBundle/invoice.js
jawr.js.bundle.invoice.mappings=/js/com.oocl.ir4.arp.web/invoice/**
jawr.js.bundle.invoice.dependencies=common

jawr.js.bundle.payment.id=/jsBundle/payment.js
jawr.js.bundle.payment.mappings=/js/com.oocl.ir4.arp.web/payment/**

jawr.js.bundle.rule.id=/jsBundle/rule.js
jawr.js.bundle.rule.mappings=/js/com.oocl.ir4.arp.web/rule/**

jawr.js.bundle.supp.id=/jsBundle/supp.js
jawr.js.bundle.supp.mappings=/js/com.oocl.ir4.arp.web/supp/**

jawr.js.bundle.tir.id=/jsBundle/tir.js
jawr.js.bundle.tir.mappings=/js/com.oocl.ir4.arp.web/tir/**

jawr.js.bundle.invoicematching.id=/jsBundle/invoicematching.js
jawr.js.bundle.invoicematching.mappings=/js/com.oocl.ir4.arp.web/invoicematching/**,/js/com.oocl.ir4.arp.web/jobcost/**

jawr.js.bundle.report.id=/jsBundle/report.js
jawr.js.bundle.report.mappings=/js/com.oocl.ir4.arp.web/report/**

jawr.js.bundle.shell.id=/jsBundle/shell.js
jawr.js.bundle.shell.mappings=/js/com.oocl.ir4.arp.web/shell/**
jawr.js.bundle.shell.dependencies=invoice,payment,rule,supp,tir,invoicematching,report

jawr.js.bundle.print.id=/jsBundle/print.js
jawr.js.bundle.print.mappings=/js/controller/api.js
jawr.js.bundle.print.dependencies=common


jawr.css.bundle.basedir=/css
jawr.css.use.cache=true
jawr.css.factory.use.singlebundle=true
jawr.css.factory.singlebundle.bundlename=/cssBundle/all.css