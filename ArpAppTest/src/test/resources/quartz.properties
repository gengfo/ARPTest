######################################
#This file is just for the scheduler to be used as RMI client. 
#
######################################

# The value of org.quartz.scheduler.instanceName
# can be any string, and has no meaning to the scheduler itself -
# but rather serves as a mechanism for client code to distinguish schedulers
# when multiple instances are used within the same program.  If you are using
# the clustering features, you must use the same name for every instance in 
# the cluster that is 'logically' the same Scheduler.
#
# NOTE: Especially for the application using LTS, the instanceName is different and 
#       specific per application to avoid the interruption between applications. And
#       the instanceName in client must be the same with the corresponding one in server. 
#       For example in TMS project the instanceName in server is named as TMS_APP, the
#       instanceName in client must be the same with the server, named as TMS_APP. 
#       For more details, you could refer to the LTS installation guide.

org.quartz.scheduler.instanceName = %%SCHEDULER.INSTANCENAME%%
org.quartz.scheduler.instanceId = CN1
org.quartz.scheduler.rmi.proxy = true
org.quartz.scheduler.rmi.registryHost = localhost
org.quartz.scheduler.rmi.registryPort = 9099